name: Security Audit

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"

jobs:
  dependency-audit:
    name: uv audit — dependency vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Audit dependencies
        run: uv audit --severity high

  sast:
    name: Bandit SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dev dependencies
        run: uv sync --frozen

      - name: Run bandit
        run: uv run bandit -r src/ -c pyproject.toml -ll

  container-scan:
    name: Trivy image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t rag-pipeline:scan .

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "rag-pipeline:scan"
          format: "table"
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true

  secret-scan:
    name: Detect secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: detect-secrets
        uses: reviewdog/action-detect-secrets@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_on_error: true
